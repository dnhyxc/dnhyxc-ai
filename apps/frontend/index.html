<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/icon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>dnhyxc-ai</title>
		<!-- 提前加载全局样式，使首帧即可应用 body.theme-* 与 Tailwind，避免深色主题白屏闪烁 -->
		<link rel="stylesheet" href="/src/index.css" />
		<link rel="stylesheet" href="/src/assets/font/index.css" />
		<style type="text/css">
			html,
			body,
			#app {
				width: 100%;
				height: 100%;
				margin: 0px;
				padding: 0px;
			}

			/* 与当前主题一致：首屏脚本已为 body 挂上 theme-*，无存储时继承 :root 的 --theme-background */
			#loader-wrapper {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: var(--theme-background);
				display: flex;
				align-items: center;
				justify-content: center;
			}

			/*
			 * 与 src/components/design/Loading/index.tsx（size=75）视觉一致：
			 * 三环 SVG + 发光滤镜 + 中心光点 + 逐字波浪（无 framer-motion，用 CSS 动画实现）
			 */
			.initial-loading {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				color: var(--theme-textcolor);
				font-family: var(--font-family), ui-sans-serif, system-ui, sans-serif;
			}

			.initial-loading__col {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1rem;
			}

			.initial-loading__stage {
				position: relative;
				width: 75px;
				height: 75px;
			}

			.initial-loading__svg {
				display: block;
				width: 100%;
				height: 100%;
			}

			.initial-loading__orbit {
				transform-origin: 50px 50px;
			}

			.initial-loading__orbit--1 {
				animation: initial-loading-spin-cw 2.5s linear infinite;
			}

			.initial-loading__orbit--2 {
				animation: initial-loading-spin-ccw 3s linear infinite;
			}

			.initial-loading__orbit--3 {
				animation: initial-loading-spin-cw 1.5s linear infinite;
				opacity: 0.6;
			}

			@keyframes initial-loading-spin-cw {
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes initial-loading-spin-ccw {
				to {
					transform: rotate(-360deg);
				}
			}

			.initial-loading__glow-host {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				pointer-events: none;
			}

			.initial-loading__glow-outer {
				position: absolute;
				width: 18.75px;
				height: 18.75px;
				border-radius: 50%;
				background: currentColor;
				opacity: 0.2;
				filter: blur(4px);
				animation: initial-loading-glow-outer 1.5s ease-in-out infinite;
			}

			.initial-loading__glow-inner {
				position: absolute;
				width: 9.375px;
				height: 9.375px;
				border-radius: 50%;
				background: currentColor;
				opacity: 0.8;
				animation: initial-loading-glow-inner 1.5s ease-in-out infinite;
			}

			@keyframes initial-loading-glow-outer {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.2;
				}
				50% {
					transform: scale(0.9);
					opacity: 0.4;
				}
			}

			@keyframes initial-loading-glow-inner {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.8;
				}
				50% {
					transform: scale(1.2);
					opacity: 0.4;
				}
			}

			.initial-loading__text-row {
				display: flex;
				justify-content: center;
				flex-wrap: wrap;
				margin: 0;
				font-size: 0.9375rem;
				font-weight: 500;
				letter-spacing: 0.05em;
			}

			.initial-loading__text-row--welcome {
				font-size: 1.0625rem;
				font-weight: 600;
				letter-spacing: 0.12em;
			}

			.initial-loading__text-row--sub {
				font-size: 0.8125rem;
				opacity: 0.88;
			}

			.initial-loading__ch {
				display: inline-block;
				animation: initial-loading-char 1.5s ease-in-out infinite;
				filter: drop-shadow(0 0 1px currentColor);
			}

			@keyframes initial-loading-char {
				0%,
				100% {
					transform: translateY(0) scale(1);
					opacity: 0.6;
				}
				50% {
					transform: translateY(-8px) scale(1.1);
					opacity: 1;
				}
			}
		</style>
	</head>

	<body>
		<script>
			(function () {
				// 与 src/hooks/theme.ts 中配色主题 name 保持一致（供首屏同步应用 class）
				var ALLOWED = {
					white: 1,
					black: 1,
					green: 1,
					purple: 1,
					"blue-1": 1,
					"blue-2": 1,
					"blue-3": 1,
					orange: 1,
					red: 1,
					beige: 1,
				};
				function fromSearch() {
					try {
						const s = location.search || "";
						const p = new URLSearchParams(s.startsWith("?") ? s : `?${s}`);
						const raw = p.get("theme") || p.get("themeType");
						return raw && ALLOWED[raw] ? raw : null;
					} catch (_e) {
						return null;
					}
				}
				function fromStorage() {
					try {
						const b = localStorage.getItem("dnhyxc_theme_bootstrap");
						if (b && ALLOWED[b]) return b;
						const j = localStorage.getItem("dnhyxc_settings_json");
						if (!j) return null;
						const o = JSON.parse(j);
						const t = o?.themeType;
						return typeof t === "string" && ALLOWED[t] ? t : null;
					} catch (_e) {
						return null;
					}
				}
				var theme = fromSearch() || fromStorage();
				if (theme) {
					document.body.classList.add(`theme-${theme}`);
				}
			})();
		</script>
		<div id="root"></div>
		<script>
			const pathname = location.pathname;
			if (pathname !== "/about") {
				const root = document.querySelector("#root");
				/** @param {string} s */
				const waveChars = (s) =>
					[...s]
						.map(
							(ch, i) =>
								`<span class="initial-loading__ch" style="animation-delay:${i * 0.08}s">${ch === " " ? "\u00A0" : ch}</span>`,
						)
						.join("");
				// 背景色由 #loader-wrapper 的 var(--theme-background) 决定；动效对齐 design/Loading
				root.innerHTML = `
					<div id="loader-wrapper">
						<div class="initial-loading" role="status" aria-live="polite" aria-busy="true">
							<div class="initial-loading__col">
								<div class="initial-loading__stage">
									<svg
										class="initial-loading__svg"
										viewBox="0 0 100 100"
										role="img"
										aria-label="加载中"
										preserveAspectRatio="xMidYMid meet"
									>
										<title>加载动画</title>
										<defs>
											<filter id="initial-loading-glow" x="-50%" y="-50%" width="200%" height="200%">
												<feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
												<feMerge>
													<feMergeNode in="coloredBlur" />
													<feMergeNode in="SourceGraphic" />
												</feMerge>
											</filter>
											<linearGradient id="initial-loading-grad1" x1="0%" y1="0%" x2="100%" y2="0%">
												<stop offset="0%" stop-color="currentColor" stop-opacity="1" />
												<stop offset="100%" stop-color="currentColor" stop-opacity="0" />
											</linearGradient>
											<linearGradient id="initial-loading-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
												<stop offset="0%" stop-color="currentColor" stop-opacity="0" />
												<stop offset="100%" stop-color="currentColor" stop-opacity="1" />
											</linearGradient>
										</defs>
										<g class="initial-loading__orbit initial-loading__orbit--1">
											<circle
												cx="50"
												cy="50"
												r="33.75"
												fill="none"
												stroke="url(#initial-loading-grad1)"
												stroke-width="4.6875"
												stroke-linecap="round"
												stroke-dasharray="112.5 168.75"
												filter="url(#initial-loading-glow)"
											/>
										</g>
										<g class="initial-loading__orbit initial-loading__orbit--2">
											<circle
												cx="50"
												cy="50"
												r="24.375"
												fill="none"
												stroke="url(#initial-loading-grad2)"
												stroke-width="3.75"
												stroke-linecap="round"
												stroke-dasharray="84.375 131.25"
												filter="url(#initial-loading-glow)"
											/>
										</g>
										<g class="initial-loading__orbit initial-loading__orbit--3">
											<circle
												cx="50"
												cy="50"
												r="16.875"
												fill="none"
												stroke="url(#initial-loading-grad1)"
												stroke-width="2.8125"
												stroke-linecap="round"
												stroke-dasharray="56.25 103.125"
												filter="url(#initial-loading-glow)"
											/>
										</g>
									</svg>
									<div class="initial-loading__glow-host" aria-hidden="true">
										<div class="initial-loading__glow-outer"></div>
										<div class="initial-loading__glow-inner"></div>
									</div>
								</div>
								<p class="initial-loading__text-row initial-loading__text-row--welcome">${waveChars("欢迎来到 dnhyxc-ai")}</p>
							</div>
						</div>
					</div>
				`;
			}
		</script>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
